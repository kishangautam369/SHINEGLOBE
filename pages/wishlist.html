<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — Shine Globe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="breadcrumb-shine"><div class="container-xl small"><a href="../index.html" class="text-muted">Home</a> / <span class="text-dark fw-semibold">Wishlist</span></div></div>

<section class="section-pad">
  <div class="container-xl">
    <h2 class="section-title mb-4">My Wishlist</h2>
    <div class="row g-4" id="wishlistGrid"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/partials.js"></script>
<script>
function render(products){
  const ids = SG.getWishlist();
  const grid = document.getElementById('wishlistGrid');
  if(ids.length === 0){
    grid.innerHTML = `<div class="col-12"><div class="empty-state"><i class="fa-regular fa-heart"></i><h4 class="mt-3">Your wishlist is empty</h4><p class="text-muted">Save items you love for later.</p><a href="shop.html" class="btn btn-brand mt-2">Discover Products</a></div></div>`;
    return;
  }
  const items = ids.map(id => products.find(p=>p.id===id)).filter(Boolean);
  grid.innerHTML = items.map(p => `<div class="col-6 col-md-4 col-lg-3">${SG.productCard(p,'')}</div>`).join('');
  if(window.AOS) AOS.refresh();
}
document.addEventListener('sg:productsReady', e => render(e.detail));
document.addEventListener('click', (e) => {
  if(e.target.closest('[data-wish]')) setTimeout(()=> SG.loadProducts().then(render), 50);
});
</script>
</body>
</html>
